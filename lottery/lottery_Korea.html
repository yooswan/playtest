<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 추첨 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root {
  --bg-dark: #0a0e1a;
  --gold: #FBC400;
  --glow: rgba(251, 196, 0, 0.3);
  --glass: rgba(255,255,255,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  overflow-x: hidden;
  color: #e0e0e0;
}

#app {
  width: 560px;
  position: relative;
  padding-bottom: 6px;
}

#header {
  text-align: center;
  padding: 8px 0 4px;
}

#header h1 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 24px;
  color: #fff;
  letter-spacing: 2px;
  text-shadow: 0 0 20px var(--glow);
}

#header p {
  font-size: 12px;
  color: #6b7280;
  margin-top: 2px;
}

#canvas-wrap {
  position: relative;
  width: 560px;
  margin: 0 auto;
}

canvas#mainCanvas {
  display: block;
  border-radius: 12px;
}

#status {
  text-align: center;
  font-size: 13px;
  color: #9ca3af;
  min-height: 18px;
  padding: 2px 0;
}

#controls {
  text-align: center;
  padding: 2px 0 4px;
}

.btn {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 16px;
  padding: 10px 32px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.btn:active { transform: scale(0.95); }

#startBtn {
  background: linear-gradient(135deg, #FBC400, #f59e0b);
  color: #1a1a1a;
  box-shadow: 0 4px 20px rgba(251,196,0,0.4);
}

#startBtn:hover {
  box-shadow: 0 6px 30px rgba(251,196,0,0.6);
  transform: translateY(-1px);
}

#startBtn:disabled {
  background: #374151;
  color: #6b7280;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

#resultPanel {
  display: none;
  text-align: center;
  padding: 8px 16px 12px;
  margin: 0 20px;
  background: var(--glass);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

#resultPanel h2 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 10px;
}

#resultPanel .btn-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 6px;
}

#shareBtn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #fff; font-size: 15px; padding: 10px 24px;
  box-shadow: 0 4px 15px rgba(59,130,246,0.3);
}

#resetBtn {
  background: rgba(255,255,255,0.08);
  color: #d1d5db; font-size: 15px; padding: 10px 24px;
  border: 1px solid rgba(255,255,255,0.12);
}

#resetBtn:hover { background: rgba(255,255,255,0.14); }

#toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1f2937; color: #fff; padding: 12px 24px;
  border-radius: 10px; font-size: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 100; pointer-events: none;
}

#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🎱 로또 번호 추첨기</h1>
    <p>물리 시뮬레이션 기반 추첨</p>
  </div>
  <div id="canvas-wrap">
    <canvas id="mainCanvas" width="560" height="480"></canvas>
  </div>
  <div id="status"></div>
  <div id="controls">
    <button class="btn" id="startBtn" onclick="startDraw()">추첨 시작</button>
  </div>
  <div id="resultPanel">
    <h2>🎉 추첨 완료!</h2>
    <div class="btn-group">
      <button class="btn" id="shareBtn" onclick="shareResult()">결과 공유하기</button>
      <button class="btn" id="resetBtn" onclick="resetAll()">다시하기</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ===== LAYOUT =====
const CANVAS_W = 560, CANVAS_H = 480;
const CX = 280, CY = 200;      // chamber center (compact)
const CR = 170;                  // chamber radius
const BALL_R = 13;
const BALL_D = BALL_R * 2;
const NUM_SEGMENTS = 120;
const SEG_THICKNESS = 14;
const TOTAL_BALLS = 45;
const DRAW_COUNT = 6;

// Exit: 1.3 ball diameters
const EXIT_WIDTH = BALL_D * 1.3;
const EXIT_HALF_WIDTH = EXIT_WIDTH / 2;
const EXIT_HALF_RAD = Math.asin(Math.min(EXIT_HALF_WIDTH / CR, 0.99));

// Wind column: 1 ball diameter centered
const WIND_HALF_WIDTH = BALL_D / 2;

// Timing
const WIND_START = 2;
const EXIT_OPEN_TIME = 5;

// Tray layout (below chamber on canvas)
const TRAY_Y = 425;
const TRAY_BALL_R = 20;
const TRAY_SLOT_GAP = 52;
const TRAY_START_X = CX - (DRAW_COUNT - 1) * TRAY_SLOT_GAP / 2;

const COLORS = {1:'#FBC400',11:'#69C8F2',21:'#FF7272',31:'#AAAAAA',41:'#B0D840'};
function getBallColor(n) {
  if(n<=10) return COLORS[1]; if(n<=20) return COLORS[11];
  if(n<=30) return COLORS[21]; if(n<=40) return COLORS[31]; return COLORS[41];
}

// ===== AUDIO =====
let audioCtx = null;
function getAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playClick() {
  try {
    const c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(800,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.08);
    g.gain.setValueAtTime(0.3,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
    o.start(c.currentTime);o.stop(c.currentTime+0.1);
  } catch(e){}
}

let windAudioRef = null;
function playWindSound() {
  try {
    const c=getAudio();
    const buf=c.createBuffer(1,c.sampleRate*2,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.12;
    const src=c.createBufferSource();src.buffer=buf;src.loop=true;
    const flt=c.createBiquadFilter();flt.type='lowpass';flt.frequency.value=500;
    const g=c.createGain();
    g.gain.setValueAtTime(0,c.currentTime);
    g.gain.linearRampToValueAtTime(0.2,c.currentTime+1.5);
    src.connect(flt);flt.connect(g);g.connect(c.destination);src.start();
    return {source:src,gain:g,filter:flt};
  } catch(e){return null;}
}

function stopWindSound(w) {
  if(!w) return;
  try {
    const c=getAudio();
    w.gain.gain.linearRampToValueAtTime(0,c.currentTime+0.5);
    setTimeout(()=>{try{w.source.stop();}catch(e){}},600);
  } catch(e){}
}

function playBallExtract() {
  try {
    const c=getAudio();
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(1200,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(300,c.currentTime+0.15);
    g.gain.setValueAtTime(0.35,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
    o.start(c.currentTime);o.stop(c.currentTime+0.2);
    const o2=c.createOscillator(),g2=c.createGain();
    o2.connect(g2);g2.connect(c.destination);o2.type='triangle';
    o2.frequency.setValueAtTime(880,c.currentTime+0.05);
    g2.gain.setValueAtTime(0.15,c.currentTime+0.05);
    g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
    o2.start(c.currentTime+0.05);o2.stop(c.currentTime+0.4);
  } catch(e){}
}

function playComplete() {
  try {
    const c=getAudio();
    [523,659,784,1047].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.25,c.currentTime+i*0.15);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.5);
      o.start(c.currentTime+i*0.15);o.stop(c.currentTime+i*0.15+0.5);
    });
  } catch(e){}
}

function playGateOpen() {
  try {
    const c=getAudio();
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(150,c.currentTime);
    o.frequency.linearRampToValueAtTime(500,c.currentTime+0.25);
    g.gain.setValueAtTime(0.12,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);
    o.start(c.currentTime);o.stop(c.currentTime+0.35);
  } catch(e){}
}

function playGateClose() {
  try {
    const c=getAudio();
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(500,c.currentTime);
    o.frequency.linearRampToValueAtTime(150,c.currentTime+0.2);
    g.gain.setValueAtTime(0.1,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
    o.start(c.currentTime);o.stop(c.currentTime+0.25);
  } catch(e){}
}

// ===== MATTER.JS =====
const { Engine, Bodies, Body, Composite } = Matter;
let engine, balls, chamberBodies, tubeBodies, exitCapBodies;
let canvas, ctx;

const state = {
  phase: 'idle',
  drawnNumbers: [],      // {number, color} sorted
  startTime: 0,
  particles: [],
  exitOpen: false,
  windStarted: false,
  lastExtractTime: 0,
  flyingBalls: [],       // balls animating from exit to tray
};

// ===== INIT =====
function init() {
  canvas = document.getElementById('mainCanvas');
  canvas.style.width = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';
  ctx = canvas.getContext('2d');
  setupPhysics();
  createChamber();
  createBalls();
  requestAnimationFrame(loop);
}

function setupPhysics() {
  engine = Engine.create({ gravity:{x:0,y:0.8}, constraintIterations:6 });
}

function createChamber() {
  chamberBodies = [];
  tubeBodies = [];
  exitCapBodies = [];

  const exitCenter = -Math.PI / 2;

  for (let i = 0; i < NUM_SEGMENTS; i++) {
    const angle = (2 * Math.PI * i) / NUM_SEGMENTS;
    let diff = angle - exitCenter;
    while (diff > Math.PI) diff -= 2*Math.PI;
    while (diff < -Math.PI) diff += 2*Math.PI;

    const isExit = Math.abs(diff) < EXIT_HALF_RAD;

    const x = CX + Math.cos(angle) * CR;
    const y = CY + Math.sin(angle) * CR;
    const segW = (2*Math.PI*CR)/NUM_SEGMENTS + 6; // extra overlap
    const seg = Bodies.rectangle(x, y, segW, SEG_THICKNESS, {
      isStatic: true,
      angle: angle + Math.PI/2,
      friction: 0.4,
      restitution: 0.4,
    });

    if (isExit) {
      exitCapBodies.push(seg);
    } else {
      chamberBodies.push(seg);
    }
  }

  // Tube walls (for guiding ball up through exit)
  const tubeW = EXIT_WIDTH;
  const tubeH = 45;
  const tubeY = CY - CR - tubeH/2 + 5;

  const lw = Bodies.rectangle(CX - tubeW/2 - 3, tubeY, 6, tubeH, {isStatic:true,friction:0.3,restitution:0.3});
  const rw = Bodies.rectangle(CX + tubeW/2 + 3, tubeY, 6, tubeH, {isStatic:true,friction:0.3,restitution:0.3});

  tubeBodies = [lw, rw];

  Composite.add(engine.world, [...chamberBodies, ...exitCapBodies, ...tubeBodies]);
}

function createBalls() {
  balls = [];
  const positions = [];

  // Generate positions inside circle
  for (let row = -7; row <= 7; row++) {
    for (let col = -7; col <= 7; col++) {
      const x = CX + col * (BALL_R * 2.5);
      const y = CY + row * (BALL_R * 2.5);
      const dist = Math.sqrt((x-CX)**2 + (y-CY)**2);
      if (dist < CR - BALL_R * 2.5) positions.push({x, y});
    }
  }

  // Shuffle positions thoroughly
  for (let i = positions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [positions[i], positions[j]] = [positions[j], positions[i]];
  }

  // Create ball numbers array and shuffle it too
  const numbers = [];
  for (let n = 1; n <= TOTAL_BALLS; n++) numbers.push(n);
  for (let i = numbers.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }

  for (let i = 0; i < TOTAL_BALLS; i++) {
    const n = numbers[i];
    const pos = positions[i] || { x: CX + (Math.random()-0.5)*60, y: CY };
    const ball = Bodies.circle(pos.x, pos.y, BALL_R, {
      restitution: 0.5,
      friction: 0.08,
      frictionAir: 0.015,
      density: 0.002,
    });
    ball.number = n;
    ball.ballColor = getBallColor(n);
    ball.isExtracted = false;
    balls.push(ball);
  }

  Composite.add(engine.world, balls);
}

// ===== EXIT OPEN / CLOSE =====
function openExit() {
  if (state.exitOpen) return;
  state.exitOpen = true;
  playGateOpen();
  exitCapBodies.forEach(seg => Composite.remove(engine.world, seg));
}

function closeExit() {
  if (!state.exitOpen) return;
  state.exitOpen = false;
  playGateClose();
  exitCapBodies.forEach(seg => Composite.add(engine.world, seg));
}

// ===== CONTAINMENT SAFETY =====
// Every frame, push any escaped ball back inside
function enforceContainment() {
  balls.forEach(ball => {
    if (ball.isExtracted) return;
    const dx = ball.position.x - CX;
    const dy = ball.position.y - CY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = CR - BALL_R - 2;

    if (dist > maxDist) {
      // If exit is open and ball is near the exit zone (top), allow it
      if (state.exitOpen && dy < -CR * 0.7 && Math.abs(dx) < EXIT_HALF_WIDTH + 5) {
        return; // let it pass through exit
      }

      // Otherwise push back inside
      const angle = Math.atan2(dy, dx);
      const newX = CX + Math.cos(angle) * (maxDist - 5);
      const newY = CY + Math.sin(angle) * (maxDist - 5);
      Body.setPosition(ball, { x: newX, y: newY });
      // Dampen velocity
      Body.setVelocity(ball, {
        x: ball.velocity.x * 0.3,
        y: ball.velocity.y * 0.3,
      });
    }
  });
}

// ===== FORCES =====
function applyForces() {
  const elapsed = (Date.now() - state.startTime) / 1000;
  const statusEl = document.getElementById('status');

  // Phase 1: 0~2s — gravity only
  if (elapsed < WIND_START) {
    statusEl.textContent = '⏳ 공이 내려오는 중...';
    return;
  }

  if (!state.windStarted) {
    state.windStarted = true;
    windAudioRef = playWindSound();
  }

  // Open exit at 5s
  if (elapsed >= EXIT_OPEN_TIME && !state.exitOpen && state.drawnNumbers.length < DRAW_COUNT) {
    openExit();
    state.phase = 'drawing';
  }

  const windElapsed = elapsed - WIND_START;
  const rampFactor = Math.min(1, windElapsed / 1.2);

  let windStrength;
  if (windElapsed < 4) {
    windStrength = 0.004 * rampFactor;
    if (!state.exitOpen) {
      statusEl.textContent = '🌪️ 바람 시작 — 공 혼합 중...';
    }
  } else {
    windStrength = 0.003;
  }

  if (state.exitOpen && state.drawnNumbers.length < DRAW_COUNT) {
    statusEl.textContent = `🎱 추출 중... (${state.drawnNumbers.length}/${DRAW_COUNT})`;
  }

  const activeBalls = balls.filter(b => !b.isExtracted);

  activeBalls.forEach(ball => {
    const bx = ball.position.x;
    const by = ball.position.y;
    const dx = bx - CX;

    // Narrow center wind column
    if (Math.abs(dx) < WIND_HALF_WIDTH) {
      const centerFactor = 1 - (Math.abs(dx) / WIND_HALF_WIDTH);
      let fy = -windStrength * (1.2 + centerFactor * 1.3) * (1 + Math.random() * 0.2);

      if (by > CY) fy *= 1.8;

      const fx = (Math.random() - 0.5) * 0.0006;
      Body.applyForce(ball, ball.position, { x: fx, y: fy });
    } else {
      // Tiny turbulence outside column
      const tx = (Math.random() - 0.5) * 0.00025;
      const ty = (Math.random() - 0.5) * 0.00015;
      Body.applyForce(ball, ball.position, { x: tx, y: ty });
    }

    // Gentle nudge toward center when near top (helps extraction)
    if (state.exitOpen && by < CY - CR * 0.3) {
      const toCenterX = (CX - bx) * 0.0001;
      Body.applyForce(ball, ball.position, { x: toCenterX, y: 0 });
    }
  });
}

// ===== PARTICLES =====
function spawnParticles() {
  const elapsed = (Date.now() - state.startTime) / 1000;
  if (elapsed < WIND_START) return;

  for (let i = 0; i < 2; i++) {
    state.particles.push({
      x: CX + (Math.random() - 0.5) * WIND_HALF_WIDTH * 2,
      y: CY + CR * 0.6 + Math.random() * 30,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(2 + Math.random() * 2.5),
      life: 1,
      size: 1 + Math.random() * 2,
    });
  }
}

function updateParticles() {
  state.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy *= 0.98; p.life -= 0.018; });
  state.particles = state.particles.filter(p => p.life > 0);
}

// ===== EXTRACTION =====
const EXIT_DETECT_Y = CY - CR - 20;

function checkExtraction() {
  if (!state.exitOpen) return;
  if (state.drawnNumbers.length >= DRAW_COUNT) return;
  if (Date.now() - state.lastExtractTime < 1000) return;

  // Collect ALL candidates, then pick randomly (fair selection)
  const candidates = [];
  for (const ball of balls) {
    if (ball.isExtracted) continue;
    if (ball.position.y < EXIT_DETECT_Y && Math.abs(ball.position.x - CX) < EXIT_HALF_WIDTH + 5) {
      candidates.push(ball);
    }
  }

  if (candidates.length > 0) {
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    extractBall(pick);
  }
}

function extractBall(ball) {
  ball.isExtracted = true;
  state.lastExtractTime = Date.now();
  Composite.remove(engine.world, ball);
  playBallExtract();

  // Add to drawn numbers (sorted insert)
  state.drawnNumbers.push({ number: ball.number, color: ball.ballColor });
  state.drawnNumbers.sort((a, b) => a.number - b.number);

  // Create flying ball animation from exit to its sorted tray position
  const sortedIdx = state.drawnNumbers.findIndex(d => d.number === ball.number);
  const targetX = TRAY_START_X + sortedIdx * TRAY_SLOT_GAP;
  const targetY = TRAY_Y;

  state.flyingBalls.push({
    number: ball.number,
    color: ball.ballColor,
    // Start at exit
    sx: ball.position.x,
    sy: CY - CR - 15,
    // Target
    tx: targetX,
    ty: targetY,
    progress: 0,
  });

  // Close exit and finish after 6
  if (state.drawnNumbers.length >= DRAW_COUNT) {
    closeExit();
    setTimeout(finishDraw, 1200);
  }
}

function updateFlyingBalls() {
  state.flyingBalls.forEach(fb => {
    fb.progress = Math.min(1, fb.progress + 0.025);
  });

  // Recalculate targets whenever drawn numbers change (because sort shifts positions)
  state.drawnNumbers.forEach((dn, idx) => {
    const fb = state.flyingBalls.find(f => f.number === dn.number);
    if (fb) {
      fb.tx = TRAY_START_X + idx * TRAY_SLOT_GAP;
      fb.ty = TRAY_Y;
    }
  });
}

// ===== CANVAS RENDERING =====
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  g.addColorStop(0, '#0d1117');
  g.addColorStop(1, '#0a0e1a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
}

function drawChamber() {
  // Glow
  const grd = ctx.createRadialGradient(CX, CY, CR-10, CX, CY, CR+20);
  grd.addColorStop(0, 'rgba(100,180,255,0)');
  grd.addColorStop(0.8, 'rgba(80,140,220,0.04)');
  grd.addColorStop(1, 'rgba(60,100,200,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Circle
  ctx.beginPath();
  ctx.arc(CX, CY, CR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(140,180,220,0.35)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Glass fill
  ctx.beginPath();
  ctx.arc(CX, CY, CR - 2, 0, Math.PI * 2);
  const glassGrd = ctx.createRadialGradient(CX-40, CY-50, 20, CX, CY, CR);
  glassGrd.addColorStop(0, 'rgba(180,210,240,0.06)');
  glassGrd.addColorStop(0.5, 'rgba(100,140,180,0.02)');
  glassGrd.addColorStop(1, 'rgba(60,80,120,0.04)');
  ctx.fillStyle = glassGrd;
  ctx.fill();

  // Glass highlight
  ctx.beginPath();
  ctx.ellipse(CX-50, CY-70, 55, 25, -0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(200,220,255,0.06)';
  ctx.fill();

  // Exit tube
  const tubeW = EXIT_WIDTH;
  const tubeTop = CY - CR - 40;
  const tubeBot = CY - CR + 8;

  ctx.fillStyle = 'rgba(80,120,170,0.1)';
  ctx.fillRect(CX - tubeW/2 - 3, tubeTop, tubeW + 6, tubeBot - tubeTop);

  ctx.strokeStyle = 'rgba(140,180,220,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(CX-tubeW/2-3, tubeTop); ctx.lineTo(CX-tubeW/2-3, tubeBot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX+tubeW/2+3, tubeTop); ctx.lineTo(CX+tubeW/2+3, tubeBot); ctx.stroke();

  // Gate indicator
  if (state.phase !== 'idle' && state.phase !== 'done') {
    if (!state.exitOpen) {
      ctx.fillStyle = 'rgba(255,80,80,0.4)';
      ctx.fillRect(CX - tubeW/2 - 2, CY - CR - 3, tubeW + 4, 7);
      ctx.fillStyle = 'rgba(255,140,140,0.7)';
      ctx.font = '9px "Noto Sans KR"'; ctx.textAlign = 'center';
      ctx.fillText('🔒 CLOSED', CX, CY - CR - 9);
    } else {
      ctx.fillStyle = 'rgba(100,255,150,0.5)';
      ctx.font = '9px "Noto Sans KR"'; ctx.textAlign = 'center';
      ctx.fillText('🔓 OPEN', CX, CY - CR - 9);
    }
  } else if (state.phase === 'idle') {
    ctx.fillStyle = 'rgba(140,180,220,0.25)';
    ctx.font = '10px "Noto Sans KR"'; ctx.textAlign = 'center';
    ctx.fillText('▲ EXIT', CX, tubeTop - 5);
  }
}

function drawWindColumn() {
  const elapsed = (Date.now() - state.startTime) / 1000;
  if (state.phase==='idle' || state.phase==='done' || elapsed < WIND_START) return;

  const alpha = 0.05 + Math.sin(Date.now()/300) * 0.02;
  const g = ctx.createLinearGradient(CX, CY+CR, CX, CY-CR);
  g.addColorStop(0, `rgba(100,180,255,${alpha*2})`);
  g.addColorStop(0.5, `rgba(100,180,255,${alpha})`);
  g.addColorStop(1, 'rgba(100,180,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(CX-WIND_HALF_WIDTH, CY-CR+10, WIND_HALF_WIDTH*2, CR*2-20);
}

function drawParticles() {
  state.particles.forEach(p => {
    const dist = Math.sqrt((p.x-CX)**2 + (p.y-CY)**2);
    if (dist > CR - 5) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,220,255,${p.life*0.3})`;
    ctx.fill();
  });
}

function drawOneBall(x, y, r, number, color) {
  // Shadow
  ctx.beginPath(); ctx.arc(x+2, y+2, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();

  // Body
  const grd = ctx.createRadialGradient(x - r*0.25, y - r*0.25, r*0.1, x, y, r);
  grd.addColorStop(0, lighten(color, 50));
  grd.addColorStop(0.5, color);
  grd.addColorStop(1, darken(color, 35));
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = grd; ctx.fill();

  // Highlight
  ctx.beginPath(); ctx.arc(x - r*0.2, y - r*0.28, r*0.35, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fill();

  // Number
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(r*0.9)}px "Black Han Sans",sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 2;
  ctx.fillText(number, x, y + 1);
  ctx.shadowBlur = 0;
}

function drawBalls() {
  balls.forEach(ball => {
    if (ball.isExtracted) return;
    drawOneBall(ball.position.x, ball.position.y, BALL_R, ball.number, ball.ballColor);
  });
}

function drawTray() {
  // Tray background
  const trayLeft = TRAY_START_X - TRAY_BALL_R - 20;
  const trayRight = TRAY_START_X + (DRAW_COUNT-1)*TRAY_SLOT_GAP + TRAY_BALL_R + 20;
  const trayTop = TRAY_Y - TRAY_BALL_R - 18;
  const trayBottom = TRAY_Y + TRAY_BALL_R + 18;

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.beginPath();
  ctx.roundRect(trayLeft, trayTop, trayRight - trayLeft, trayBottom - trayTop, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,180,220,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Label
  ctx.fillStyle = 'rgba(140,180,220,0.3)';
  ctx.font = '11px "Noto Sans KR"'; ctx.textAlign = 'center';
  ctx.fillText('당첨번호', CX, trayTop - 6);

  // Empty slots
  for (let i = 0; i < DRAW_COUNT; i++) {
    const sx = TRAY_START_X + i * TRAY_SLOT_GAP;
    ctx.beginPath();
    ctx.arc(sx, TRAY_Y, TRAY_BALL_R + 2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(140,180,220,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw settled balls (flying balls that reached destination)
  state.drawnNumbers.forEach((dn, idx) => {
    const fb = state.flyingBalls.find(f => f.number === dn.number);
    if (!fb) return;
    if (fb.progress >= 1) {
      // Fully arrived: draw in tray
      const tx = TRAY_START_X + idx * TRAY_SLOT_GAP;
      drawOneBall(tx, TRAY_Y, TRAY_BALL_R, dn.number, dn.color);
    }
  });
}

function drawFlyingBalls() {
  state.flyingBalls.forEach(fb => {
    if (fb.progress >= 1) return; // drawn in tray instead

    // Ease out cubic
    const t = fb.progress;
    const ease = 1 - Math.pow(1 - t, 3);

    // Arc path: go up from exit, then curve down to tray
    const midX = (fb.sx + fb.tx) / 2;
    const midY = Math.min(fb.sy, fb.ty) - 40; // peak above both

    // Quadratic bezier
    const x = (1-ease)*(1-ease)*fb.sx + 2*(1-ease)*ease*midX + ease*ease*fb.tx;
    const y = (1-ease)*(1-ease)*fb.sy + 2*(1-ease)*ease*midY + ease*ease*fb.ty;

    const r = BALL_R + (TRAY_BALL_R - BALL_R) * ease; // grow as it flies
    drawOneBall(x, y, r, fb.number, fb.color);
  });
}

function drawTurbine() {
  const elapsed = (Date.now()-state.startTime)/1000;
  if (state.phase==='idle' || state.phase==='done' || elapsed < WIND_START) return;

  const turbGrd = ctx.createRadialGradient(CX, CY+CR-10, 5, CX, CY+CR-10, 45);
  turbGrd.addColorStop(0, 'rgba(100,180,255,0.15)');
  turbGrd.addColorStop(1, 'rgba(100,180,255,0)');
  ctx.fillStyle = turbGrd;
  ctx.fillRect(CX-45, CY+CR-35, 90, 35);

  const t = Date.now()/200;
  ctx.save(); ctx.translate(CX, CY+CR+3);
  for (let i = 0; i < 4; i++) {
    ctx.save(); ctx.rotate(t + (i*Math.PI)/2);
    ctx.fillStyle = 'rgba(140,180,220,0.25)';
    ctx.fillRect(-2, -16, 4, 16); ctx.restore();
  }
  ctx.restore();
}

// Pipe visual from exit to tray
function drawPipe() {
  if (state.flyingBalls.length === 0) return;

  ctx.strokeStyle = 'rgba(140,180,220,0.08)';
  ctx.lineWidth = EXIT_WIDTH + 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(CX, CY - CR - 30);
  ctx.quadraticCurveTo(CX, CY - CR - 60, CX + 80, TRAY_Y - 50);
  ctx.stroke();
  ctx.lineWidth = 1;
}

// ===== MAIN LOOP =====
function loop() {
  const active = state.phase==='settling' || state.phase==='spinning' || state.phase==='drawing';

  if (active) {
    Engine.update(engine, 1000/60);
    enforceContainment();
    applyForces();
    checkExtraction();
    spawnParticles();

    const elapsed = (Date.now()-state.startTime)/1000;
    if (state.phase==='settling' && elapsed >= WIND_START) state.phase = 'spinning';
  }

  updateParticles();
  updateFlyingBalls();

  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground();
  drawChamber();
  drawWindColumn();
  drawTurbine();
  drawParticles();
  drawBalls();
  drawTray();
  drawFlyingBalls();

  requestAnimationFrame(loop);
}

// ===== ACTIONS =====
function startDraw() {
  playClick();
  document.getElementById('startBtn').disabled = true;
  state.phase = 'settling';
  state.startTime = Date.now();
  state.drawnNumbers = [];
  state.flyingBalls = [];
  state.exitOpen = false;
  state.windStarted = false;
  state.lastExtractTime = 0;
  document.getElementById('status').textContent = '⏳ 공이 내려오는 중...';
}

function finishDraw() {
  state.phase = 'done';
  stopWindSound(windAudioRef);
  windAudioRef = null;
  playComplete();
  document.getElementById('status').textContent = '';
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('startBtn').style.display = 'none';
}

function resetAll() {
  playClick();
  Composite.clear(engine.world, false);
  state.phase='idle'; state.drawnNumbers=[]; state.particles=[];
  state.flyingBalls=[]; state.exitOpen=false; state.windStarted=false;
  state.lastExtractTime=0;
  stopWindSound(windAudioRef); windAudioRef=null;
  document.getElementById('resultPanel').style.display='none';
  document.getElementById('startBtn').style.display='';
  document.getElementById('startBtn').disabled=false;
  document.getElementById('status').textContent='';
  createChamber(); createBalls();
}

// ===== SHARE =====
function getReferrerUrl() {
  const p=new URLSearchParams(window.location.search);
  return p.get('ref')||document.referrer||window.location.href;
}

async function shareResult() {
  playClick();
  const sorted = state.drawnNumbers.map(d=>d.number).sort((a,b)=>a-b).join(', ');
  const url = getReferrerUrl();
  const text = `🎱 오늘의 로또 번호 추첨 결과\n\n당첨번호: ${sorted}\n\n🔗 직접 뽑아보기: ${url}`;
  try {
    if(navigator.share) await navigator.share({text});
    else { await navigator.clipboard.writeText(text); showToast('📋 결과가 클립보드에 복사되었습니다!'); }
  } catch(e) {
    try { await navigator.clipboard.writeText(text); showToast('📋 결과가 클립보드에 복사되었습니다!'); }
    catch(e2) { showToast('공유에 실패했습니다.'); }
  }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== HELPERS =====
function lighten(hex,pct) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16),f=pct/100;
  return `rgb(${Math.min(255,r+(255-r)*f)},${Math.min(255,g+(255-g)*f)},${Math.min(255,b+(255-b)*f)})`;
}
function darken(hex,pct) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16),f=1-pct/100;
  return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
}

window.addEventListener('DOMContentLoaded', init);
</script>
